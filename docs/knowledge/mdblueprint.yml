lean:
  default_repository: econcslib
  repositories:
    - id: econcslib
      title: EconCSLib
      local_path: ../..
      web_url: https://github.com/gametheoryinlean/EconCSLib
      source_url_template: "{web_url}/blob/{revision}/{path}#L{line}"
      revision: auto


math:
  throw_on_error: false
  # NOTE: Per mdblueprint convention (math-authoring.md), do not redeclare
  # KaTeX built-ins here. mdblueprint's KNOWN_MACROS filters built-ins it
  # knows about; the macros below are KaTeX built-ins that are NOT yet in
  # KNOWN_MACROS but are used in node bodies, so they must remain declared
  # until KNOWN_MACROS is extended upstream. The expansions deliberately
  # use only safe constructions (no unicode characters that KaTeX would
  # re-normalize back to the same macro, which causes infinite expansion).
  macros:
    arg: "\\operatorname{arg}"
    bigl: "\\left("
    bigr: "\\right)"
    dots: "\\ldots"
