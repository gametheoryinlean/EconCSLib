name: Build Lean

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-lean-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lakefile.toml') }}

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build
        run: lake build

      - name: Build examples
        run: lake build EconCSLib.Examples

      - name: Check Lean sources for placeholders
        run: |
          if rg -n '\b(sorry|admit)\b' EconCSLib -g '*.lean'; then
            echo "Lean source modules must not contain sorry or admit."
            exit 1
          fi

      - name: Check diff whitespace
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          fi
